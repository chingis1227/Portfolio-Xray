# Клиент 2: инфляция/монетарный стресс > рецессия; 5–7% ном., TargetVol 8–10%, MaxDD −22%;
# ликвидность 9 мес.; RB G/D/I 45/15/40; без crypto и HY; золото + TIPS; commodities — широкий DBC.
investor_currency: USD
initial_investable_amount: 1000000
liquidity_need_months: 9
monthly_expenses: 5000
portfolio_value:
cash_policy: allowed_for_scaling

tickers:
  - VOO
  - VT
  - VGK
  - VWO
  - SCHD
  - VDC
  - BND
  - TLT
  - SCHP
  - TIP
  - GLD
  - DBC
  - BIL

client_profile:

target_nominal_return_annual: 0.06
target_vol_annual: 0.09
target_max_drawdown_pct: -0.22
horizon_years: 10.0

rc_block_targets:
  Growth: 0.45
  Duration: 0.15
  Inflation: 0.40

rc_block_target_ranges:
  Growth: { min: 0.38, max: 0.52 }
  Duration: { min: 0.10, max: 0.22 }
  Inflation: { min: 0.33, max: 0.47 }

# Якоря отбора Inflation-блока: TIPS + золото + умеренный commodity (широкий индекс).
tips_ticker: SCHP
gold_ticker: GLD
comm_ticker: DBC

growth_core_candidates: [VOO, VT]
min_single_security_weight_pct: 0.02
rc_policy_mode: permissive
allow_leverage: false
allow_short_selling: false

output_dir: results_csv
output_dir_final: "_scenario_client2_main"
