# Advanced / Legacy — NOT Core MVP Stress Test Lab
#
# Historical stress fallback v1: ticker proxies, asset-class representatives, and factor replay
# tiers for robust scenario optimization and scenario_library_normalized consumers only.
#
# Core MVP historical replay (src/core_mvp_historical_stress_replay.py) uses DIRECT history only
# and must NOT load this file. See docs/specs/core_mvp_historical_stress_replay_spec.md.
#
# Used by: src/historical_stress_fallback.py (normalized / advanced path).

min_coverage_ratio: 0.45

ticker_proxies:
  VOO: SPY
  SCHD: VYM
  BND: AGG
  SCHP: TIP
  TLT: TLT
  GLD: GLD
  SLV: SLV
  QQQ: QQQ

# Map portfolio tickers to asset-class buckets (fallback tier 3).
# SPY: broad US equity (same representative as us_equity); needed when config uses SPY instead of VOO.
ticker_asset_class:
  SPY: us_equity
  VOO: us_equity
  QQQ: growth_tech_equity
  SCHD: dividend_value_equity
  BND: aggregate_bonds
  SCHP: tips
  TLT: long_treasuries
  GLD: gold
  SLV: silver_commodities

# Representative monthly-return column per class (must exist in monthly_returns when used).
asset_class_proxies:
  us_equity: SPY
  growth_tech_equity: QQQ
  dividend_value_equity: VYM
  aggregate_bonds: AGG
  tips: TIP
  long_treasuries: TLT
  gold: GLD
  silver_commodities: SLV
