  requires_signals: []
  requires_stress_confirmation: true
  rationale_en: Prefer the structural root-cause diagnosis over the symptom when the required confirming evidence is present.
  source_refs:
  - src/block_4/problem_taxonomy.py::ROOT_CAUSE_ELEVATION_RULES
  - docs/specs/diagnosis_interpretation_methodology_spec.md
- rule_id: crisis_over_volatility
  prefer_primary: weak_crisis_resilience
  demote_when_present:
