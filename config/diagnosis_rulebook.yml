problems:
  high_volatility:
    label_en: High volatility
    legacy_ids: []
    role: symptom
    eligible_as_primary: true
    suppress_launchpad_methods: false
    technical_definition_en: Annualized portfolio volatility exceeds the materiality band on Block 2.2 and is not fully explained
      by a stress-confirmed crisis narrative alone.
    portfolio_manager_interpretation_en: The portfolio swings more than the investor's risk budget may tolerate in normal
      periods. Volatility alone does not prove a bad portfolio ... it must be weighed against return and stress behavior.
    professional_rationale_en: This diagnosis matters because it can explain downstream risk outcomes through the controlled
      Block 4 evidence chain rather than through unsourced narrative copy. The portfolio swings more than the investor's risk
      budget may tolerate in normal periods. Volatility alone does not prove a bad portfolio ... it must be weighed against
      return and stress behavior.
    evidence:
      required_signals:
      - vol_annual
      supporting_signals:
      - rolling_volatility
      - block_2_6_equity_shock
      - client_fit_volatility_vs_target
      contrary_signals:
      - low_stress_loss_with_high_vol
      - client_fit_within_profile
      missing_evidence_policy_en: If required evidence is unavailable, keep the diagnosis lower confidence or unavailable
        instead of filling the gap with narrative inference.
      source_artifacts:
      - client_fit_check.json
      - portfolio_xray.json
      - stress_report.json
    threshold_refs:
    - activation.raw_score_min
    - activation.min_required_signal_strength
    - materiality_bands.high_min
    - materiality_bands.medium_min
    - materiality_bands.low_min
    - stress_confirmation_multipliers.confirmed
    - stress_confirmation_multipliers.pre_stress_only
    - stress_confirmation_multipliers.contradicted
    - stress_confirmation_multipliers.unavailable
    - confidence.partial_data_cap
    - confidence.data_trust_cap
    - signal_strength.vol_baseline
    - signal_strength.vol_range
    - signal_strength.stress_loss_floor
    - signal_strength.stress_loss_range
    - severity.high_decision_score_min
    - severity.medium_decision_score_min
    action_paths:
      primary_action_path_id: reduce_volatility
      secondary_action_path_ids:
      - compare_against_simple_benchmark
    launchpad:
      card_title_en: Reduce Volatility
      what_this_tests_en: Whether a lower-volatility construction improves the risk profile without unacceptable return loss.
      tradeoff_en: Lower volatility vs lower expected return and possible turnover.
      skip_when_en: Skip if volatility is only mildly above benchmark and stress losses are immaterial.
      default_candidate_method_ids:
      - minimum_variance
      - risk_parity
      - equal_weight
    false_positive_notes_en:
    - Short-window vol spike after a single risk-on month.
    false_negative_notes_en:
    - Vol masked by cash sleeve or stale monthly window.
    when_not_primary_en: When stress-confirmed crisis weakness is material and volatility is only moderately elevated.
    do_not_overreact_en: High volatility with strong crisis resilience may be an acceptable growth posture.
    hypothesis_tests:
    - test_id: high_volatility_reduce_volatility_diagnostic_test
      hypothesis_to_test_en: Test whether the reduce volatility path improves the evidence signals behind High volatility
        without unacceptable deterioration elsewhere.
      preferred_action_path_id: reduce_volatility
      suggested_method_ids:
      - minimum_variance
      - risk_parity
      - equal_weight
      success_criteria_refs:
      - high_volatility_criterion_1_vol_annual
      - high_volatility_criterion_2_rolling_volatility
      tradeoff_to_watch_en: Lower volatility vs lower expected return and possible turnover.
      when_to_skip_en: Skip if volatility is only mildly above benchmark and stress losses are immaterial.
      decision_boundary_en: Candidate comparison and Decision Verdict decide whether any action is justified; this hypothesis
        is diagnostic only.
    success_criteria:
    - criterion_id: high_volatility_criterion_1_vol_annual
      label_en: Watch vol annual
      metric_or_signal_refs:
      - vol_annual
      direction: lower_is_better
      source_artifacts:
      - current_vs_candidate.json
      - portfolio_xray.json
      explanation_en: Use this signal to judge whether the diagnostic hypothesis improved without claiming that a trade is
        automatically justified.
    - criterion_id: high_volatility_criterion_2_rolling_volatility
      label_en: Watch rolling volatility
      metric_or_signal_refs:
      - rolling_volatility
      direction: lower_is_better
      source_artifacts:
      - current_vs_candidate.json
      - portfolio_xray.json
      explanation_en: Use this signal to judge whether the diagnostic hypothesis improved without claiming that a trade is
        automatically justified.
    downstream_comparison_focus_en: Compare vol, max drawdown, and turnover vs current.
    narrative_templates:
      headline_en: 'Primary diagnostic frame: High volatility.'
      root_cause_narrative_en: Use only populated evidence signals and source artifacts when rendering this diagnosis.
      evidence_sentence_templates_en:
      - '{signal_label} is {observed_value} in {source_block} from {source_artifact}.'
      contrary_evidence_template_en: This was not selected as primary when contrary or stronger root-cause evidence dominated.
      confidence_template_en: Confidence reflects evidence quality, stress confirmation, and missing-data limits rather than
        persuasion.
    source_refs: &id001
    - docs/specs/block_4_diagnosis_v3_spec.md
    - docs/specs/client_fit_check_spec.md
    - docs/specs/diagnosis_rulebook_schema_spec.md
    - src/block_4/problem_taxonomy.py
    - src/block_4/evidence_extraction.py
  high_drawdown:
    label_en: High drawdown
    legacy_ids:
    - high_drawdown_risk
    role: symptom
    eligible_as_primary: true
    suppress_launchpad_methods: false
    technical_definition_en: Historical or stress-aligned drawdown magnitude exceeds materiality on Block 2.2 or Block 3.4
      worst historical scenario.
    portfolio_manager_interpretation_en: The portfolio has experienced or would experience deep peak-to-trough losses. Drawdown
      path matters for investor behavior and recovery time.
    professional_rationale_en: This diagnosis matters because it can explain downstream risk outcomes through the controlled
      Block 4 evidence chain rather than through unsourced narrative copy. The portfolio has experienced or would experience
      deep peak-to-trough losses. Drawdown path matters for investor behavior and recovery time.
    evidence:
      required_signals:
      - max_drawdown
      supporting_signals:
      - worst_historical_scenario
      - time_underwater
      - block_2_6_recession_severe
      - client_fit_historical_max_drawdown_vs_limit
      - client_fit_worst_stress_loss_vs_limit
      contrary_signals:
      - drawdown_recovered_quickly
      - client_fit_within_profile
      missing_evidence_policy_en: If required evidence is unavailable, keep the diagnosis lower confidence or unavailable
        instead of filling the gap with narrative inference.
      source_artifacts:
      - client_fit_check.json
      - portfolio_xray.json
      - stress_report.json
    threshold_refs:
    - activation.raw_score_min
    - activation.min_required_signal_strength
    - materiality_bands.high_min
    - materiality_bands.medium_min
    - materiality_bands.low_min
    - stress_confirmation_multipliers.confirmed
    - stress_confirmation_multipliers.pre_stress_only
    - stress_confirmation_multipliers.contradicted
    - stress_confirmation_multipliers.unavailable
    - confidence.partial_data_cap
    - confidence.data_trust_cap
    - signal_strength.max_drawdown_floor
    - signal_strength.max_drawdown_range
    - signal_strength.stress_loss_floor
    - signal_strength.stress_loss_range
    - severity.high_decision_score_min
    - severity.medium_decision_score_min
    action_paths:
      primary_action_path_id: reduce_drawdown_risk
      secondary_action_path_ids:
      - improve_crisis_resilience
    launchpad:
      card_title_en: Reduce Drawdown Risk
      what_this_tests_en: Whether downside-focused candidates reduce peak-to-trough loss versus current weights.
      tradeoff_en: Lower drawdown vs lower expected return.
      skip_when_en: Skip if drawdown is historical only and current risk structure materially changed.
      default_candidate_method_ids:
      - minimum_cvar
      - minimum_variance
      - risk_parity
      - maximum_diversification
    false_positive_notes_en:
    - Young ETF history with one short crash window.
    false_negative_notes_en:
    - Drawdown diluted by recent rally without fixing tail structure.
    when_not_primary_en: When weak crisis resilience with larger stress losses is stress-confirmed.
    do_not_overreact_en: A recovered drawdown with improved diversification may not require action.
    hypothesis_tests:
    - test_id: high_drawdown_reduce_drawdown_risk_diagnostic_test
      hypothesis_to_test_en: Test whether the reduce drawdown risk path improves the evidence signals behind High drawdown
        without unacceptable deterioration elsewhere.
      preferred_action_path_id: reduce_drawdown_risk
      suggested_method_ids:
      - minimum_cvar
      - minimum_variance
      - risk_parity
      success_criteria_refs:
      - high_drawdown_criterion_1_max_drawdown
      - high_drawdown_criterion_2_worst_historical_scenario
      tradeoff_to_watch_en: Lower drawdown vs lower expected return.
      when_to_skip_en: Skip if drawdown is historical only and current risk structure materially changed.
      decision_boundary_en: Candidate comparison and Decision Verdict decide whether any action is justified; this hypothesis
        is diagnostic only.
    success_criteria:
    - criterion_id: high_drawdown_criterion_1_max_drawdown
      label_en: Watch max drawdown
      metric_or_signal_refs:
      - max_drawdown
      direction: lower_is_better
      source_artifacts:
      - current_vs_candidate.json
      - portfolio_xray.json
      explanation_en: Use this signal to judge whether the diagnostic hypothesis improved without claiming that a trade is
