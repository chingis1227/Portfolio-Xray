      direction: lower_is_better
      source_artifacts:
      - current_vs_candidate.json
      - portfolio_xray.json
      explanation_en: Use this signal to judge whether the diagnostic hypothesis improved without claiming that a trade is
        automatically justified.
    downstream_comparison_focus_en: Compare max drawdown, recovery time, and stress replay loss.
    narrative_templates:
      headline_en: 'Primary diagnostic frame: High drawdown.'
      root_cause_narrative_en: Use only populated evidence signals and source artifacts when rendering this diagnosis.
      evidence_sentence_templates_en:
      - '{signal_label} is {observed_value} in {source_block} from {source_artifact}.'
      contrary_evidence_template_en: This was not selected as primary when contrary or stronger root-cause evidence dominated.
