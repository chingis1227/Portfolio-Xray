governance:
  no_recommendation_language_en: Rulebook text may describe diagnostic tests only. Candidate comparison and Decision Verdict
    decide whether any action is justified.
  missing_evidence_policy_en: Missing data remains missing evidence; do not infer a diagnosis from unavailable artifacts.
  unsupported_claim_policy_en: Every material user-facing claim must trace to a problem id, evidence signal, source artifact,
    or governed threshold reference.
  numeric_threshold_policy_en: Numeric activation, materiality, scoring, severity, and confidence values live in config/block_4_thresholds.yml,
    not in this rulebook.
  allowed_source_artifacts:
  - portfolio_xray.json
  - stress_report.json
  - current_vs_candidate.json
  - problem_classification.json
  - candidate_launchpad.json
  - client_fit_check.json
  required_validation_checks:
  - problem_ids_match_python_registry
  - action_paths_match_python_registry
  - roles_match_python_registry
  - signals_exist_in_registry_or_extractor
  - threshold_refs_exist_in_threshold_source
  - no_numeric_activation_thresholds_in_rulebook
  - launchpad_methods_match_python_registry
  - source_refs_exist
  - no_recommendation_language
