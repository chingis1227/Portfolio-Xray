    - docs/specs/block_4_diagnosis_v3_spec.md
  improve_crisis_resilience:
    label_en: Improve crisis resilience
    goal_label: Improve crisis resilience
    candidate_method_ids:
    - minimum_cvar
    - maximum_diversification
