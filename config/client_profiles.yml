# Client risk profiles — target return, volatility, max drawdown, liquidity floor.
# When client_profile is set in config, midpoints are applied via src/client_profiles.py.

profiles:
  ultra_conservative:
    name: Ultra Conservative
    max_drawdown_pct: ~10%
    target_return_annual: { min_pct: 2, max_pct: 4, midpoint: 0.03 }
    target_vol_annual: { min_pct: 2, max_pct: 5, midpoint: 0.035 }
    target_max_drawdown_pct: -0.10
    liquidity_floor_pct: { min_pct: 10, max_pct: 25, midpoint: 0.175 }
    note: "Цель — не упасть; доходность вторична."

  conservative:
    name: Conservative
    max_drawdown_pct: ~15%
    target_return_annual: { min_pct: 3, max_pct: 6, midpoint: 0.045 }
    target_vol_annual: { min_pct: 4, max_pct: 7, midpoint: 0.055 }
    target_max_drawdown_pct: -0.15
    liquidity_floor_pct: { min_pct: 10, max_pct: 20, midpoint: 0.15 }
    note: "Умеренный рост, приоритет стабильность."

  balanced:
    name: Balanced
    max_drawdown_pct: ~20%
    target_return_annual: { min_pct: 5, max_pct: 7, midpoint: 0.06 }
    target_vol_annual: { min_pct: 7, max_pct: 10, midpoint: 0.085 }
    target_max_drawdown_pct: -0.20
    liquidity_floor_pct: { min_pct: 5, max_pct: 15, midpoint: 0.10 }
    note: "Рост + контроль просадок."

  growth:
    name: Growth
    max_drawdown_pct: ~25–30%
    target_return_annual: { min_pct: 7, max_pct: 10, midpoint: 0.085 }
    target_vol_annual: { min_pct: 10, max_pct: 14, midpoint: 0.12 }
    target_max_drawdown_pct: -0.275
    min_single_security_weight_pct: 0.02
    liquidity_floor_pct: { min_pct: 0, max_pct: 10, midpoint: 0.05 }
    note: "Доходность, просадки принимаются."

  aggressive:
    name: Aggressive
    max_drawdown_pct: ">30%"
    target_return_annual: { min_pct: 10, max_pct: 20, midpoint: 0.12 }
    target_vol_annual: { min_pct: 14, max_pct: 20, midpoint: 0.17 }
    target_max_drawdown_pct: -0.35
    min_single_security_weight_pct: 0.02
    liquidity_floor_pct: { min_pct: 0, max_pct: 5, midpoint: 0.025 }
    note: "Максимум роста; просадки как у акций."
