# Client risk profiles — Risk budget (Pareto) templates.
# Policy: risk budget only for Growth, Duration, Inflation; Liquidity excluded. Corridor ±5 p.p.
# When client_profile is set in config, these midpoints are used as defaults; you can override manually.
# Block ranges define allowed bounds per profile; normalization: if sum != 100%, other blocks scale proportionally to share the remainder.

profiles:
  ultra_conservative:
    name: Ultra Conservative
    max_drawdown_pct: ~10%
    target_return_annual: { min_pct: 2, max_pct: 4, midpoint: 0.03 }
    target_vol_annual: { min_pct: 2, max_pct: 5, midpoint: 0.035 }
    target_max_drawdown_pct: -0.10
    risk_budget:
      Growth:   { min_pct: 10, max_pct: 20, midpoint: 0.15 }
      Duration: { min_pct: 50, max_pct: 70, midpoint: 0.60 }
      Inflation: { min_pct: 5, max_pct: 15, midpoint: 0.10 }
    liquidity_floor_pct: { min_pct: 10, max_pct: 25, midpoint: 0.175 }
    note: "Цель — не упасть; доходность вторична. Риск: инфляция, ставки."

  conservative:
    name: Conservative
    max_drawdown_pct: ~15%
    target_return_annual: { min_pct: 3, max_pct: 6, midpoint: 0.045 }
    target_vol_annual: { min_pct: 4, max_pct: 7, midpoint: 0.055 }
    target_max_drawdown_pct: -0.15
    risk_budget:
      Growth:   { min_pct: 20, max_pct: 35, midpoint: 0.275 }
      Duration: { min_pct: 40, max_pct: 60, midpoint: 0.50 }
      Inflation: { min_pct: 5, max_pct: 15, midpoint: 0.10 }
    liquidity_floor_pct: { min_pct: 10, max_pct: 20, midpoint: 0.15 }
    note: "Умеренный рост, приоритет стабильность. Риск: ставки + инфляция."

  balanced:
    name: Balanced
    max_drawdown_pct: ~20%
    target_return_annual: { min_pct: 5, max_pct: 7, midpoint: 0.06 }
    target_vol_annual: { min_pct: 7, max_pct: 10, midpoint: 0.085 }
    target_max_drawdown_pct: -0.20
    risk_budget:
      Growth:   { min_pct: 35, max_pct: 55, midpoint: 0.45 }
      Duration: { min_pct: 25, max_pct: 45, midpoint: 0.35 }
      Inflation: { min_pct: 5, max_pct: 15, midpoint: 0.10 }
    liquidity_floor_pct: { min_pct: 5, max_pct: 15, midpoint: 0.10 }
    note: "Рост + контроль просадок."

  growth:
    name: Growth
    max_drawdown_pct: ~25–30%
    target_return_annual: { min_pct: 7, max_pct: 10, midpoint: 0.085 }
    target_vol_annual: { min_pct: 10, max_pct: 14, midpoint: 0.12 }
    target_max_drawdown_pct: -0.275
    risk_budget:
      Growth:   { min_pct: 55, max_pct: 75, midpoint: 0.65 }
      Duration: { min_pct: 10, max_pct: 25, midpoint: 0.175 }
      Inflation: { min_pct: 5, max_pct: 15, midpoint: 0.10 }
    liquidity_floor_pct: { min_pct: 0, max_pct: 10, midpoint: 0.05 }
    note: "Доходность, просадки принимаются."

  aggressive:
    name: Aggressive
    max_drawdown_pct: ">30%"
    target_return_annual: { min_pct: 10, max_pct: 20, midpoint: 0.12 }
    target_vol_annual: { min_pct: 14, max_pct: 20, midpoint: 0.17 }
    target_max_drawdown_pct: -0.35
    risk_budget:
      Growth:   { min_pct: 80, max_pct: 100, midpoint: 0.90 }
      Duration: { min_pct: 0, max_pct: 10, midpoint: 0.05 }
      Inflation: { min_pct: 0, max_pct: 10, midpoint: 0.05 }
    liquidity_floor_pct: { min_pct: 0, max_pct: 5, midpoint: 0.025 }
    note: "Максимум роста; просадки как у акций."
