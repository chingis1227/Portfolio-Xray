# Base: tickers by block. One ticker = one block (no overlaps).
# When you list tickers in config.yml, the system looks them up here to know
# which block each belongs to. If a ticker is not in any block, validation fails.
#
# Block names: Growth, Growth_HY, Duration, Inflation, Liquidity, Tail

