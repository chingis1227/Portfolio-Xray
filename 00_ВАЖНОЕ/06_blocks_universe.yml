# Credit Beta (High Yield + EM Debt + preferred).
# Сейчас все тикеры этой категории считаются одной группой (Growth_HY); отдельный подблок Growth_EM_debt не используется.
Growth_HY:
  - HYG
  - JNK
  - EMB
  - HYEM
  - ELD
  - PFF

