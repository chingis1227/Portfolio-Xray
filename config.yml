# =============================================================================
# Portfolio MRI — Core MVP demo config (portfolio-first diagnosis)
# Required user input: investor_currency, tickers, current_weights.
# See config.yml.example for legacy optimizer, mandate, and technical settings.
# =============================================================================

investor_currency: USD

tickers: [SPY, QQQ, GLD, SLV, BND, SCHD, SCHP, TLT]

current_weights:
  SPY: 0.10
  QQQ: 0.13
  GLD: 0.09
  SLV: 0.09
  BND: 0.16
  SCHD: 0.17
  SCHP: 0.13
  TLT: 0.13

# Technical run settings (backend defaults; not Core MVP first-screen fields)
output_dir: results_csv
output_dir_final: "Main portfolio"
returns_frequency: monthly
market_data_provider: ibkr_yfinance_fallback
