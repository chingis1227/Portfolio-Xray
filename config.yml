# =============================================================================
# Portfolio Metrics Standard — Main Configuration
# All portfolio assumptions and constraints are controlled from this file.
# Changing these variables triggers full recalculation without code edits.
# =============================================================================

# =============================================================================
# SECTION 1: CORE SETTINGS
# =============================================================================
# investor_currency: на выбор — USD (доллар), EUR (евро), JPY (йена), CHF (франк).

investor_currency: USD
initial_investable_amount: 1000
# liquidity_need is derived (liquidity_need_months * monthly_expenses); do not set manually for portfolio logic

# ---------- Liquidity (life floor): liquidity_need_total = liquidity_need_months × monthly_expenses; liquidity_floor_pct = that / portfolio_value (or initial_investable_amount) ----------
liquidity_need_months: 0
monthly_expenses: 0
portfolio_value:

# ---------- Cash policy: allowed_for_scaling | required_floor | prohibited ----------
cash_policy: allowed_for_scaling

# =============================================================================
# SECTION 2: RISK-FREE AND BENCHMARK (drives excess-return metrics, beta, MAR)
# =============================================================================
# risk_free_source: used for excess-return metrics; default by currency if omitted.
# cash_proxy_ticker: used for NaN-safe portfolio logic and temporary capital.
# base_benchmark_ticker (canonical name in config; in code: benchmark_base_ticker): Beta_base, stress.
# beta_local_mapping: optional override { ticker: local_benchmark_ticker } for Beta_local.

risk_free_source: FRED:DTB3
cash_proxy_ticker: BIL
base_benchmark_ticker: SPY
beta_local_mapping: {}

# =============================================================================
# SECTION 3: PORTFOLIO TICKERS AND WEIGHTS
# =============================================================================
# tickers: list of instruments in this portfolio (you set this). If blocks_universe.yml exists,
#   each ticker must appear there in exactly one block; blocks for the run are derived automatically.
#   If a ticker is not in blocks_universe.yml, validation fails with a clear message.
# blocks: optional. If blocks_universe.yml is absent, you can set block lists here; otherwise ignored.
# Weights are not set here. They are produced by optimization and stored in portfolio_weights.yml
# (in the same directory as config.yml). Run optimization first, then run report.

tickers: [VOO, VT, QQQ, SMH, VGK, BBJP, VWO, VDC, ARMY.PA, ITA, CIBR, ROBO, SCHD, COPX, URA, SLV, GLD, SCHP, BIL, BND]

# =============================================================================
# SECTION 4: PORTFOLIO ASSUMPTIONS AND TARGETS
# =============================================================================
# client_profile: optional. Values — ultra_conservative | conservative | balanced | growth | aggressive.
# If set, missing target/risk_budget fields are filled from config/client_profiles.yml (midpoints). You can override manually.
# Reminder: 1 Ultra Conservative  2 Conservative  3 Balanced  4 Growth  5 Aggressive (see Config UI for full table).

client_profile: Growth

# allow_leverage, allow_short_selling: на выбор true / false.
# Поля в процентах (ниже) можно вводить в процентах (например 15%) или десятичной дробью (0.15):
#   min_acceptable_return, target_nominal_return_annual, target_vol_annual,
#   target_max_drawdown_pct. null допустим где указано.
# horizon_years: число лет (например 10, 3, 0.5); null допустим.

allow_leverage: false
allow_short_selling: false
min_acceptable_return:
target_nominal_return_annual: 0.085
target_vol_annual: 0.12
target_max_drawdown_pct: -0.275
horizon_years: 10.0

# =============================================================================
# SECTION 5: OPTIMIZATION CONSTRAINTS (for current or future portfolio construction)
# =============================================================================
# В процентах: можно вводить как 15%, так и 0.15.
# rc_block_targets: from client_profile or set manually (Growth, Duration, Inflation); sum = 1.0.
# If rc_asset_cap_pct or max_single_security_weight_pct or min_single_security_weight_pct is null or 0,
# values are taken from docs/docs/feasibility_constraints_spec.md (formulas by N, Nc, Ns, RB).

rc_asset_cap_pct: 0.28
# Duration = 10% (single-asset block BND: achievable RC at most rc_asset_cap); remainder 8.92% -> Inflation only so Growth stays 70.27% (less pressure on BBJP)
rc_block_targets:
  Growth: 0.7027
  Duration: 0.10
  Inflation: 0.1973
max_single_security_weight_pct:
min_single_security_weight_pct:

N_rc: 3
growth_core_candidates: ["VOO", "VT", "SPY", "VTI"]
# Donor (Shift Mode): proportional or equal — you can set equal.
donor_shift_mode: proportional

# =============================================================================
# SECTION 6: ANALYSIS SETTINGS
# =============================================================================

windows_months: [36, 60, 120]
coverage_threshold: 0.9
output_dir: output
