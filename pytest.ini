[pytest]
testpaths = tests
markers =
    live_core: live core E2E artifact gate (RM-1021); skipped unless --live-core or PORTFOLIO_LIVE_CORE_E2E=1
    live_full: live full E2E artifact gate (RM-1029); skipped unless --live-full or PORTFOLIO_LIVE_FULL_E2E=1
    integration: integration test requiring external services/network
    slow: slow-running test excluded from fast CI
    block_4_v2: Historical Block 4 v2 evidence-to-problem regression bundle
    block_4_v3: Block 4 v3 diagnosis-first regression bundle
