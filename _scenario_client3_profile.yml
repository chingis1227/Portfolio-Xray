# Клиент 3: «сон важнее доходности»; 3.5–5% ном.; TargetVol 5–7%; MaxDD −15%;
# горизонт 8 лет; 18 мес. расходов в кэше; RB G/D/I 25/60/15;
# Growth: только quality/dividend; без HY/крипты/тематик; Duration: барбелль BND+TLT+LQD.
investor_currency: USD
initial_investable_amount: 1000000
liquidity_need_months: 18
monthly_expenses: 5000
portfolio_value:
cash_policy: required_floor

target_nominal_return_annual: 0.0425
target_vol_annual: 0.06
target_max_drawdown_pct: -0.15
horizon_years: 8.0

tickers:
  - SCHD
  - USMV
  - VYM
  - BND
  - AGG
  - TLT
  - LQD
  - SCHP
  - GLD
  - BIL

client_profile:

rc_block_targets:
  Growth: 0.25
  Duration: 0.60
  Inflation: 0.15

rc_block_target_ranges:
  Growth: { min: 0.18, max: 0.32 }
  Duration: { min: 0.52, max: 0.68 }
  Inflation: { min: 0.10, max: 0.22 }

# Барбелль по дюрации + IG; TIPS + золото в инфляции.
duration_int_ticker: BND
duration_long_ticker: TLT
duration_ig_ticker: LQD
tips_ticker: SCHP
gold_ticker: GLD

growth_core_candidates: [SCHD, USMV]
min_single_security_weight_pct: 0.02
rc_policy_mode: permissive
allow_leverage: false
allow_short_selling: false

output_dir: results_csv
output_dir_final: "_scenario_client3_main"
